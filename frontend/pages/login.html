<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Escola Técnica</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    .page { min-height: 100vh; background: #0D2B55; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; position: relative; overflow: hidden; }
    .bg-circle1 { position: absolute; width: 380px; height: 380px; border-radius: 50%; border: 60px solid rgba(2,192,154,0.08); top: -80px; right: -80px; }
    .bg-circle2 { position: absolute; width: 260px; height: 260px; border-radius: 50%; border: 40px solid rgba(2,128,144,0.1); bottom: -60px; left: -60px; }
    .card { background: #ffffff; border-radius: 12px; width: 100%; max-width: 400px; overflow: hidden; position: relative; z-index: 1; }
    .card-top { padding: 2rem 2rem 1.5rem; text-align: center; border-bottom: 0.5px solid #f1f5f9; }
    .logo-wrap { display: inline-flex; align-items: center; justify-content: center; width: 52px; height: 52px; border-radius: 14px; background: #0D2B55; margin-bottom: 1rem; }
    .logo-wrap i { font-size: 26px; color: #02C39A; }
    .card-top h1 { font-size: 20px; font-weight: 500; color: #0f172a; }
    .card-top p { font-size: 13px; color: #64748b; margin-top: 4px; }
    .card-body { padding: 1.75rem 2rem; }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; background: #f8fafc; border-radius: 8px; padding: 4px; margin-bottom: 1.5rem; }
    .tab { padding: 7px; font-size: 13px; font-weight: 500; font-family: inherit; border: none; border-radius: 6px; cursor: pointer; background: none; color: #64748b; transition: all 0.15s; }
    .tab.active { background: #fff; color: #0f172a; border: 0.5px solid #f1f5f9; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
    .field label { font-size: 13px; font-weight: 500; color: #0f172a; }
    .input-wrap { position: relative; }
    .input-wrap i.ico-left { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #64748b; pointer-events: none; }
    .input-wrap input { width: 100%; height: 40px; padding: 0 40px 0 38px; font-size: 14px; font-family: inherit; border: 0.5px solid #e2e8f0; border-radius: 8px; background: #fff; color: #0f172a; outline: none; transition: border-color 0.15s; }
    .input-wrap input:focus { border-color: #028090; box-shadow: 0 0 0 3px rgba(2,128,144,0.12); }
    .input-wrap input.error { border-color: #E24B4A; }
    .btn-eye { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #64748b; font-size: 16px; }
    .err-msg { font-size: 12px; color: #E24B4A; display: none; }
    .err-msg.show { display: block; }
    .row-forgot { display: flex; justify-content: flex-end; margin-top: -4px; margin-bottom: 1rem; }
    .link { font-size: 12px; color: #028090; background: none; border: none; cursor: pointer; font-family: inherit; text-decoration: underline; }
    .alert { display: none; background: #FAECE7; border: 0.5px solid #F0997B; border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #993C1D; margin-bottom: 1rem; align-items: center; gap: 8px; }
    .alert.show { display: flex; }
    .btn-submit { width: 100%; height: 42px; background: #028090; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; font-family: inherit; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; }
    .btn-submit:hover { background: #026b78; }
    .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }
    .card-footer { padding: 1rem 2rem; border-top: 0.5px solid #f1f5f9; text-align: center; background: #f8fafc; }
    .card-footer span { font-size: 12px; color: #64748b; }
    .demo-hint { font-size: 11px; color: #64748b; margin-top: 0.75rem; text-align: center; }
    .demo-hint code { background: #f1f5f9; padding: 1px 5px; border-radius: 4px; font-size: 11px; }
  </style>
</head>
<body>
<div class="page">
  <div class="bg-circle1"></div>
  <div class="bg-circle2"></div>
  <div class="card">
    <div class="card-top">
      <div class="logo-wrap"><i class="ti ti-school"></i></div>
      <h1>Escola Técnica</h1>
      <p>Profissionalizante — Sistema de Matrículas</p>
    </div>
    <div class="card-body">
      <div class="tabs">
        <button class="tab active" id="tab-admin" onclick="setTab('admin')">
          <i class="ti ti-shield-lock"></i> Administrador
        </button>
        <button class="tab" id="tab-aluno" onclick="setTab('aluno')">
          <i class="ti ti-user"></i> Aluno
        </button>
      </div>
      <div class="alert" id="alert">
        <i class="ti ti-alert-circle"></i>
        <span id="alert-msg">E-mail ou senha incorretos</span>
      </div>
      <div class="field">
        <label>E-mail</label>
        <div class="input-wrap">
          <i class="ti ti-mail ico-left"></i>
          <input type="email" id="email" placeholder="seu@email.com"/>
          <button class="btn-eye" style="visibility:hidden"></button>
        </div>
        <span class="err-msg" id="err-email">Informe um e-mail válido</span>
      </div>
      <div class="field">
        <label>Senha</label>
        <div class="input-wrap">
          <i class="ti ti-lock ico-left"></i>
          <input type="password" id="senha" placeholder="••••••••"/>
          <button class="btn-eye" id="btn-eye" onclick="toggleSenha()">
            <i class="ti ti-eye" id="eye-icon"></i>
          </button>
        </div>
        <span class="err-msg" id="err-senha">Informe a senha</span>
      </div>
      <div class="row-forgot">
        <button class="link" onclick="alert('Recurso não disponível no momento.')">Esqueci minha senha</button>
      </div>
      <button class="btn-submit" id="btn-login" onclick="entrar()">
        <i class="ti ti-login"></i> Entrar
      </button>
      <p class="demo-hint" id="demo-hint">
        Admin: <code>admin@escola.com</code> / <code>admin123</code>
      </p>
    </div>
    <div class="card-footer">
      <span id="footer-txt">Acesso ao sistema de matrículas</span>
    </div>
  </div>
</div>

<script>
  const API = 'https://escola-tecnica-backend.onrender.com/api';
  let tabAtual = 'admin';

  function setTab(tab) {
    tabAtual = tab;
    document.getElementById('tab-admin').classList.toggle('active', tab === 'admin');
    document.getElementById('tab-aluno').classList.toggle('active', tab === 'aluno');
    document.getElementById('alert').classList.remove('show');
  }

  function toggleSenha() {
    const input = document.getElementById('senha');
    const icon  = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'ti ti-eye-off';
    } else {
      input.type = 'password';
      icon.className = 'ti ti-eye';
    }
  }

  function validar() {
    let ok = true;
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      document.getElementById('email').classList.add('error');
      document.getElementById('err-email').classList.add('show');
      ok = false;
    } else {
      document.getElementById('email').classList.remove('error');
      document.getElementById('err-email').classList.remove('show');
    }
    if (!senha) {
      document.getElementById('senha').classList.add('error');
      document.getElementById('err-senha').classList.add('show');
      ok = false;
    } else {
      document.getElementById('senha').classList.remove('error');
      document.getElementById('err-senha').classList.remove('show');
    }
    return ok;
  }

  async function entrar() {
    document.getElementById('alert').classList.remove('show');
    if (!validar()) return;

    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader"></i> Entrando...';

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value.trim(),
          senha: document.getElementById('senha').value
        })
      });
      const data = await res.json();

      if (data.token) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('usuario', JSON.stringify(data.user));
        btn.innerHTML = '<i class="ti ti-check"></i> Redirecionando...';
        btn.style.background = '#065f46';
        setTimeout(() => window.location.href = 'dashboard.html', 800);
      } else {
        document.getElementById('alert-msg').textContent = data.erro || 'E-mail ou senha incorretos';
        document.getElementById('alert').classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '<i class="ti ti-login"></i> Entrar';
      }
    } catch (e) {
      document.getElementById('alert-msg').textContent = 'Erro de conexão. Verifique se o servidor está rodando.';
      document.getElementById('alert').classList.add('show');
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-login"></i> Entrar';
    }
  }

  document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('senha').focus(); });
  document.getElementById('senha').addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });
</script>
</body>
</html>
