
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .page { min-height: 600px; background: #0D2B55; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; position: relative; overflow: hidden; }
  .bg-circle1 { position: absolute; width: 380px; height: 380px; border-radius: 50%; border: 60px solid rgba(2,192,154,0.08); top: -80px; right: -80px; }
  .bg-circle2 { position: absolute; width: 260px; height: 260px; border-radius: 50%; border: 40px solid rgba(2,128,144,0.1); bottom: -60px; left: -60px; }
  .card { background: var(--color-background-primary); border-radius: var(--border-radius-lg); width: 100%; max-width: 400px; overflow: hidden; position: relative; z-index: 1; border: 0.5px solid rgba(255,255,255,0.08); }
  .card-top { padding: 2rem 2rem 1.5rem; text-align: center; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .logo-wrap { display: inline-flex; align-items: center; justify-content: center; width: 52px; height: 52px; border-radius: 14px; background: #0D2B55; margin-bottom: 1rem; }
  .logo-wrap i { font-size: 26px; color: #02C39A; }
  .card-top h1 { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .card-top p { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }
  .card-body { padding: 1.75rem 2rem; }
  .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 4px; margin-bottom: 1.5rem; }
  .tab { padding: 7px; font-size: 13px; font-weight: 500; font-family: var(--font-sans); border: none; border-radius: 6px; cursor: pointer; transition: all 0.15s; background: none; color: var(--color-text-secondary); }
  .tab.active { background: var(--color-background-primary); color: var(--color-text-primary); border: 0.5px solid var(--color-border-tertiary); }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
  .field label { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
  .input-wrap { position: relative; }
  .input-wrap i.ico-left { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--color-text-secondary); pointer-events: none; }
  .input-wrap input { width: 100%; height: 40px; padding: 0 40px 0 38px; font-size: 14px; font-family: var(--font-sans); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); outline: none; transition: border-color 0.15s; }
  .input-wrap input:focus { border-color: #028090; box-shadow: 0 0 0 3px rgba(2,128,144,0.12); }
  .input-wrap input.error { border-color: #E24B4A; }
  .btn-eye { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--color-text-secondary); font-size: 16px; padding: 2px; }
  .err-msg { font-size: 12px; color: #E24B4A; display: none; }
  .err-msg.show { display: block; }
  .row-forgot { display: flex; justify-content: flex-end; margin-top: -4px; margin-bottom: 1rem; }
  .link { font-size: 12px; color: #028090; background: none; border: none; cursor: pointer; font-family: var(--font-sans); text-decoration: underline; }
  .alert { display: none; background: #FAECE7; border: 0.5px solid #F0997B; border-radius: var(--border-radius-md); padding: 10px 12px; font-size: 13px; color: #993C1D; margin-bottom: 1rem; align-items: center; gap: 8px; }
  .alert.show { display: flex; }
  .btn-submit { width: 100%; height: 42px; background: #028090; border: none; border-radius: var(--border-radius-md); font-size: 15px; font-weight: 500; font-family: var(--font-sans); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; margin-top: 0.25rem; }
  .btn-submit:hover { background: #0D9488; }
  .btn-submit:disabled { background: #B4B2A9; cursor: not-allowed; }
  .card-footer { padding: 1rem 2rem; border-top: 0.5px solid var(--color-border-tertiary); text-align: center; background: var(--color-background-secondary); }
  .card-footer span { font-size: 12px; color: var(--color-text-secondary); }
  .badge-admin { display: inline-block; font-size: 11px; background: #E6F1FB; color: #185FA5; padding: 2px 8px; border-radius: var(--border-radius-md); font-weight: 500; margin-left: 6px; }
  .badge-aluno { display: inline-block; font-size: 11px; background: #E1F5EE; color: #0F6E56; padding: 2px 8px; border-radius: var(--border-radius-md); font-weight: 500; margin-left: 6px; }
  .demo-hint { font-size: 11px; color: var(--color-text-secondary); margin-top: 0.75rem; text-align: center; }
  .demo-hint code { background: var(--color-background-secondary); padding: 1px 5px; border-radius: 4px; font-family: var(--font-mono); font-size: 11px; }
</style>

<div class="page">
  <div class="bg-circle1"></div>
  <div class="bg-circle2"></div>

  <div class="card">
    <div class="card-top">
      <div class="logo-wrap">
        <i class="ti ti-school" aria-hidden="true"></i>
      </div>
      <h1>Escola Técnica</h1>
      <p>Profissionalizante — Sistema de Matrículas</p>
    </div>

    <div class="card-body">
      <div class="tabs">
        <button class="tab active" id="tab-admin" onclick="setTab('admin')">
          <i class="ti ti-shield-lock" aria-hidden="true"></i> Administrador
        </button>
        <button class="tab" id="tab-aluno" onclick="setTab('aluno')">
          <i class="ti ti-user" aria-hidden="true"></i> Aluno
        </button>
      </div>

      <div class="alert" id="alert">
        <i class="ti ti-alert-circle" aria-hidden="true"></i>
        <span id="alert-msg">E-mail ou senha incorretos</span>
      </div>

      <div class="field">
        <label>E-mail</label>
        <div class="input-wrap">
          <i class="ti ti-mail ico-left" aria-hidden="true"></i>
          <input type="email" id="email" placeholder="seu@email.com" />
          <button class="btn-eye" style="visibility:hidden" tabindex="-1"></button>
        </div>
        <span class="err-msg" id="err-email">Informe um e-mail válido</span>
      </div>

      <div class="field">
        <label>Senha</label>
        <div class="input-wrap">
          <i class="ti ti-lock ico-left" aria-hidden="true"></i>
          <input type="password" id="senha" placeholder="••••••••" />
          <button class="btn-eye" id="btn-eye" onclick="toggleSenha()" aria-label="Mostrar senha">
            <i class="ti ti-eye" id="eye-icon" aria-hidden="true"></i>
          </button>
        </div>
        <span class="err-msg" id="err-senha">Informe a senha</span>
      </div>

      <div class="row-forgot">
        <button class="link" onclick="forgotPass()">Esqueci minha senha</button>
      </div>

      <button class="btn-submit" id="btn-login" onclick="entrar()">
        <i class="ti ti-login" aria-hidden="true"></i>
        Entrar
      </button>

      <p class="demo-hint" id="demo-hint">
        Admin: <code>admin@escola.com</code> / <code>admin123</code>
      </p>
    </div>

    <div class="card-footer">
      <span id="footer-txt">Acesso restrito a administradores <span class="badge-admin">Admin</span></span>
    </div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  let tabAtual = 'admin';
  let senhaVisivel = false;

  const usuarios = {
    admin: { email: 'admin@escola.com', senha: 'admin123', redir: 'dashboard admin' },
    aluno: { email: 'aluno@escola.com', senha: 'aluno123', redir: 'painel do aluno' },
  };

  function setTab(tab) {
    tabAtual = tab;
    $('tab-admin').classList.toggle('active', tab==='admin');
    $('tab-aluno').classList.toggle('active', tab==='aluno');
    $('alert').classList.remove('show');
    $('email').classList.remove('error');
    $('senha').classList.remove('error');
    $('err-email').classList.remove('show');
    $('err-senha').classList.remove('show');

    if (tab === 'admin') {
      $('footer-txt').innerHTML = 'Acesso restrito a administradores <span class="badge-admin">Admin</span>';
      $('demo-hint').innerHTML = 'Admin: <code>admin@escola.com</code> / <code>admin123</code>';
    } else {
      $('footer-txt').innerHTML = 'Alunos acessam suas matrículas e mensagens <span class="badge-aluno">Aluno</span>';
      $('demo-hint').innerHTML = 'Aluno: <code>aluno@escola.com</code> / <code>aluno123</code>';
    }
  }

  function toggleSenha() {
    senhaVisivel = !senhaVisivel;
    $('senha').type = senhaVisivel ? 'text' : 'password';
    $('eye-icon').className = senhaVisivel ? 'ti ti-eye-off' : 'ti ti-eye';
  }

  function mostrarAlerta(msg) {
    $('alert-msg').textContent = msg;
    $('alert').classList.add('show');
  }

  function validar() {
    let ok = true;
    const email = $('email').value.trim();
    const senha = $('senha').value;

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      $('email').classList.add('error');
      $('err-email').classList.add('show');
      ok = false;
    } else {
      $('email').classList.remove('error');
      $('err-email').classList.remove('show');
    }

    if (!senha) {
      $('senha').classList.add('error');
      $('err-senha').classList.add('show');
      ok = false;
    } else {
      $('senha').classList.remove('error');
      $('err-senha').classList.remove('show');
    }

    return ok;
  }

  function entrar() {
    $('alert').classList.remove('show');
    if (!validar()) return;

    const btn = $('btn-login');
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader" aria-hidden="true"></i> Entrando...';

    setTimeout(() => {
      const u = usuarios[tabAtual];
      const email = $('email').value.trim();
      const senha = $('senha').value;

      if (email === u.email && senha === u.senha) {
        btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Redirecionando...';
        btn.style.background = '#0F6E56';
        setTimeout(() => {
          sendPrompt(`Login feito como ${tabAtual}! Me mostra a próxima tela: ${u.redir}`);
        }, 800);
      } else {
        mostrarAlerta('E-mail ou senha incorretos. Tente novamente.');
        btn.disabled = false;
        btn.innerHTML = '<i class="ti ti-login" aria-hidden="true"></i> Entrar';
        $('email').classList.add('error');
        $('senha').classList.add('error');
      }
    }, 1000);
  }

  function forgotPass() {
    mostrarAlerta('Recurso de recuperação de senha não disponível no momento.');
  }

  $('email').addEventListener('keydown', e => { if(e.key==='Enter') $('senha').focus(); });
  $('senha').addEventListener('keydown', e => { if(e.key==='Enter') entrar(); });
</script>
